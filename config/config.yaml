# ============================================================
# JEPA-Spillover — configuração central do pipeline
# Todos os scripts leem este arquivo (via src/jepa_spillover/config.py)
# ============================================================

project:
  name: jepa-spillover
  seed: 42
  device: cuda            # auto | cpu | cuda

paths:
  data_raw: data/raw
  data_interim: data/interim
  data_processed: data/processed
  data_external: data/external
  results: results
  checkpoints: results/checkpoints
  figures: results/figures
  metrics: results/metrics
  rankings: results/rankings

# ------------------------------------------------------------
# Coleta de dados (ver scripts/ e docs/data_sources.md)
# ------------------------------------------------------------
data_sources:
  ncbi_virus:
    email: "gmottaz@gmail.com"   # exigido pela API Entrez do NCBI
    api_key: cd1a6ee372855eb9f6524eb1c26888adb408                     # opcional; aumenta o limite de requisições
    # Famílias priorizadas (RNA, relevância zoonótica documentada)
    families:
      - Coronaviridae
      - Filoviridae
      - Paramyxoviridae
      - Orthomyxoviridae
      - Arenaviridae
    min_length: 1000          # comprimento mínimo (bp) das sequências
    max_records_per_family: 5000
  virushostdb:
    url: "https://www.genome.jp/ftp/db/virushostdb/virushostdb.tsv"
  virhostnet:
    url: "http://virhostnet.prabi.fr/"   # interações vírus-hospedeiro (download manual/registrado)
  taxonomy:
    ncbi_taxdump: "https://ftp.ncbi.nlm.nih.gov/pub/taxonomy/taxdump.tar.gz"

# ------------------------------------------------------------
# Curadoria
# ------------------------------------------------------------
curation:
  dedup_identity: 0.99      # CD-HIT: agrupar sequências >= 99% idênticas
  remove_ambiguous_frac: 0.01   # descartar se > 1% de bases ambíguas (N)
  allowed_alphabet: "ACGTU"
  # Limite de sequências por família — reduz uso de RAM em PCs pessoais.
  # null = sem limite (usar em servidores). 2000 é seguro para ~8 GB RAM.
  max_seqs_per_family: 2000

# ------------------------------------------------------------
# Representações
# ------------------------------------------------------------
features:
  kmer:
    k: 4                    # tamanho do k-mer (4^k features: k=4→256, k=5→1024, k=6→4096) — benchmark mostrou k=4 melhor trade-off
    normalize: true
    chunk_size: 500          # sequências por chunk no cálculo de k-mers (↓ = menos RAM)
  embeddings:
    backend: kmer_pca       # kmer_pca | transformer
    dim: 128                # dimensão dos embeddings (↓ para economizar RAM)
    pca_chunk: 500          # chunk do IncrementalPCA (↓ = menos RAM, mais lento)

# ------------------------------------------------------------
# Modelo JEPA genômico
# ------------------------------------------------------------
jepa:
  context_block_frac: 0.5   # fração da sequência usada como contexto
  num_target_blocks: 4
  encoder:
    type: transformer       # transformer | cnn
    embed_dim: 256
    depth: 6
    num_heads: 8
    dropout: 0.1
  predictor:
    hidden_dim: 512
    depth: 2
  ema_momentum: 0.996       # atualização do codificador-alvo (target encoder)

train:
  batch_size: 32             # RTX 3050 6GB: 32 é seguro para o Transformer JEPA
  epochs: 50
  save_every_epochs: 5       # salvar checkpoint intermediário a cada N épocas (para resume)
  lr: 0.0003
  weight_decay: 0.05
  warmup_epochs: 5
  num_workers: 4             # GPU: multiprocessing para alimentar a GPU sem gargalo

# ------------------------------------------------------------
# Fine-tuning supervisionado (predição de risco de spillover)
# ------------------------------------------------------------
finetune:
  task: spillover_risk
  cv_folds: 5
  stratify_by: family
  holdout_families: ["Arenaviridae"]   # validação entre famílias (vírus "emergentes")
  metrics: [auroc, auprc, f1, precision, recall, specificity, brier]

# ------------------------------------------------------------
# Visualização do espaço latente
# ------------------------------------------------------------
viz:
  reducer: umap             # umap | tsne
  n_neighbors: 30           # mais vizinhos = clusters mais coesos (era 15)
  min_dist: 0.05            # distância mínima menor = clusters mais compactos (era 0.1)
  max_points: 3000          # subamostrar para visualização (estratificado por família)
  tsne_perplexity: 40       # perplexidade do t-SNE
  compare_reducers: true    # gerar UMAP e t-SNE e escolher melhor pelo silhouette
  knn_for_ranking: 25       # vizinhos para o score de proximidade a zoonóticos

# ------------------------------------------------------------
# Publicação
# ------------------------------------------------------------
publish:
  hf_repo_id: "gbmotta/jepa-spillover"
  hf_repo_type: model       # model | dataset | space
  github_repo: "gbmotta/jepa-spillover"
